services:
  - type: web
    name: brain-tumor-classifier          # any name you like
    env: python                           # tells Render to install Python deps
    buildCommand: |
      # ---------- Build the React frontend ----------
      cd frontend && npm ci && npm run build && \
      # Copy the compiled bundle into Flask’s static folder
      mkdir -p ../backend/static && cp -r build/* ../backend/static/
    startCommand: |
      # ---------- Launch Flask with Gunicorn ----------
      cd backend && \
      pip install -r requirements.txt && \
      gunicorn app:app --bind 0.0.0.0:${PORT:-5000} --workers 2
    healthCheckPath: /                     # Render pings this URL to know the service is alive
    # (optional) you can set env vars, auto‑scale, etc. here
